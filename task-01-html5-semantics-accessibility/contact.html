		<main>
			<h1>Get In Touch</h1>
			<section id="links">
				<h2>Professional profiles</h2>
				<ul>
					<li><a href="https://www.hackerrank.com/">HackerRank</a></li>
					<li><a href="https://leetcode.com/">LeetCode</a></li>
					<li><a href="https://github.com/">GitHub</a></li>
				</ul>
			</section>
			<section id="contact">
				<h2>Reach me at</h2>
				<ul>
					<li><a href="mailto:arjun.mehra.ds@gmail.com">arjun.mehra.ds@gmail.com</a></li>
					<li><a href="https://in.linkedin.com/">LinkedIn</a></li>
				</ul>
			</section>
			<section id="contact-form">
				<h2>Send a Message</h2>
				<form>
					<label for="name">Name:</label>
					<input type="text" id="name" name="name" placeholder="Enter your name or organization name" autocomplete="name" required><br>
					<label for="mail">Email:</label>
					<input type="email" id="mail" name="email" placeholder="Enter your Email" autocomplete="email" required><br>
					<label for="purpose">Choose purpose of contact:</label>
					<select id="purpose" name="purpose" >
					<option value="" selected disabled hidden>Select your purpose of contact</option>
						<option value="Job Opportunity">Job Opportunity</option>
						<option value="Internship">Internship</option>
						<option value="Collaboration">Collaboration</option>
						<option value="General Inquiry">General Inquiry</option>
						<option value="Other">Other</option>
					</select><br>
					<label for="message">Message</label>
					<textarea id="message" name="message" placeholder="Enter your message" required ></textarea><br>
					<button type="submit">Submit contact form</button>
				</form>

			</section>
		</main>
