<html>

	<title>portfolio of person</title>

	<body>
	
		<header>
			<nav>
				<a href="index.html">Home</a>
				<a href="about.html">About</a>
				<a href="projects.html">Projects</a>
				<a href="contact.html">Contact</a>
			</nav>
		</header>
		
		<main>
			<h1>Contact</h1>
			<section id="links">
				<h2>Professional profiles</h2>
				<ul>
					<li><a href="hackerrank.com">hackerank</a></li>
					<li><a href="leetcode.com">leetcode</a></li>
					<li><a href="github.com">github</a></li>
				</ul>
			</section>
			<section id="contact">
				<h2>contact</h2>
				<ul>
					<li><a href="mailto:XX.XX@gmail.com">Email</a></li>
					<li><a href="linkedin.com">linkedin</a></li>
				</ul>
			</section>
			<section>
				<h2>Contact form:</h2>
				<form>
					<label for="name">Name:</label>
					<input type="text" id="name" placeholder="Enter your name or organization name"><br>
					<label for="mail">Email:</label>
					<input type="email" id="mail" placeholder="Enter your Email"><br>
					<label for="purpose">Chose purpose of contact:</label>
					<select id="purpose">
					<option value="" selected disabled hidden>Select your purpose of contact</option>
						<option value="Job Opportunity">Job Opportunity</option>
						<option value="Internship">Internship</option>
						<option value="Collaboration">Collaboration</option>
						<option value="General Inquiry">General Inquiry</option>
						<option value="Other">Other</option>
					</select><br>
					<label for="message">Message</label>
					<textarea id="message" placeholder="Enter your message"></textarea><br>
					<button type="submit">Submit contact form</button>
				</form>

			</section>
		</main>

			<nav>

		</footer>
		
	</body>
